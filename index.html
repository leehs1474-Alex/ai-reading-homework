<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  >

  <meta
    name="description"
    content="온라인 Reading 숙제 시스템"
  >

  <title>Reading Homework</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>
  <main class="app-shell">

    <!-- 학생 선택 화면 -->
    <section
      id="loginScreen"
      class="homework-card"
    >
      <header class="header-area">
        <p class="academy-label">
          READING HOMEWORK
        </p>

        <h1>오늘의 Reading 숙제</h1>

        <p class="intro-text">
          반과 이름을 선택하면 숙제를 시작할 수 있어요.
        </p>
      </header>

      <section class="form-area">
        <div class="field-group">
          <label for="classSelect">
            반 선택
          </label>

          <select
            id="classSelect"
            disabled
          >
            <option value="">
              반 정보를 불러오는 중...
            </option>
          </select>
        </div>

        <div class="field-group">
          <label for="studentSelect">
            이름 선택
          </label>

          <select
            id="studentSelect"
            disabled
          >
            <option value="">
              먼저 반을 선택하세요
            </option>
          </select>
        </div>

        <button
          id="startButton"
          type="button"
          disabled
        >
          숙제 시작
        </button>

        <p
          id="statusMessage"
          class="status-message"
          aria-live="polite"
        >
          시스템을 준비하고 있습니다.
        </p>
      </section>
    </section>

    <!-- Reading 숙제 화면 -->
    <section
      id="homeworkScreen"
      class="homework-card hidden"
    >
      <header class="header-area">
        <p class="academy-label">
          TODAY'S HOMEWORK
        </p>

        <h1 id="homeworkTitle">
          Reading 숙제
        </h1>

        <p
          id="bookTitle"
          class="intro-text"
        ></p>
      </header>

      <section class="sentence-area">
        <p
          id="sentenceProgress"
          class="sentence-progress"
        ></p>

        <div class="sentence-box">
          <p id="sentenceText"></p>
        </div>

        <!-- 녹음 영역 -->
        <section
          class="recording-area"
          aria-label="문장 녹음"
        >
          <button
            id="recordButton"
            type="button"
          >
            🎤 녹음 시작
          </button>

          <p
            id="recordingTimer"
            class="recording-timer"
            aria-live="polite"
          >
            00:00 / 00:30
          </p>

          <audio
            id="recordingPlayer"
            class="recording-player hidden"
            controls
            preload="metadata"
          >
            이 브라우저에서는 음성 재생을 지원하지 않습니다.
          </audio>
        </section>

        <p
          id="homeworkStatus"
          class="status-message"
          aria-live="polite"
        >
          문장을 소리 내어 읽어보세요.
        </p>
      </section>
    </section>

  </main>

  <script src="app.js"></script>
</body>
</html>
